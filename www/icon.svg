<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="22" fill="#06060e"/>
  <!-- controller body -->
  <rect x="14" y="38" width="72" height="38" rx="18" fill="#0d0d22" stroke="#00f2ff" stroke-width="1.5"/>
  <!-- d-pad horizontal -->
  <rect x="22" y="53" width="22" height="7" rx="3" fill="#00f2ff" opacity="0.7"/>
  <!-- d-pad vertical -->
  <rect x="29" y="46" width="7" height="22" rx="3" fill="#00f2ff" opacity="0.7"/>
  <!-- buttons -->
  <circle cx="66" cy="51" r="5" fill="#ff0a6c" opacity="0.9"/>
  <circle cx="76" cy="57" r="5" fill="#ffc107" opacity="0.9"/>
  <circle cx="66" cy="63" r="5" fill="#00e89a" opacity="0.9"/>
  <circle cx="56" cy="57" r="5" fill="#a855f7" opacity="0.9"/>
  <!-- glow rings -->
  <circle cx="66" cy="51" r="7" fill="none" stroke="#ff0a6c" stroke-width="1" opacity="0.4"/>
  <!-- start/select -->
  <rect x="44" y="55" width="7" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
  <!-- stick nubs -->
  <circle cx="30" cy="31" r="7" fill="#1a1a3a" stroke="#00f2ff" stroke-width="1.2"/>
  <circle cx="30" cy="31" r="4" fill="#00f2ff" opacity="0.5"/>
  <circle cx="68" cy="31" r="7" fill="#1a1a3a" stroke="#ff0a6c" stroke-width="1.2"/>
  <circle cx="68" cy="31" r="4" fill="#ff0a6c" opacity="0.5"/>
</svg>
